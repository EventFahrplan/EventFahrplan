truth = "1.4.4" # NoSuchFieldError as of 1.4.5, see https://github.com/google/truth/issues/1608
turbine = "1.2.1"
unmock = "0.11.0"
versions = "0.54.0"

[plugins]
android-application = { id = "com.android.application", version.ref = "android-gradle-plugin" }
