constraintlayout = "2.2.1"
core-ktx = "1.18.0" # compileSdk 37 is required as of 1.19.0
core-testing = "2.2.0"
dexcount = "4.0.0"
email-intent-builder = "2.0.0"
engelsystem = "12.0.0"
fragment-compose = "1.8.9"
htmlconverter = "1.1.1"
junit-jupiter = "5.14.3" # emulators on CI do not run junit 6 https://github.com/mannodermaus/android-junit5/issues/392
junit-platform = "1.14.3" # emulators on CI do not run junit 6 https://github.com/mannodermaus/android-junit5/issues/392
kotlin = "2.4.0"
