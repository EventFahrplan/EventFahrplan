moshi = "1.15.2"
navigation = "2.9.8"
okhttp = "5.4.0"
robolectric = "4.3_r2-robolectric-0"
room-states = "3.0.0"
schedule = "2.0.0"
snackengage = "0.30"
sonarqube = "7.3.1.8318"
threetenbp = "1.7.3"
